<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>리얼 그래픽 로또 추첨기</title>
    <style>
        :root {
            --bg-grad-1: #2c3e50;
            --bg-grad-2: #000000;
            --machine-glass: rgba(255, 255, 255, 0.1);
            --machine-border: rgba(255, 255, 255, 0.2);
            --accent: #f1c40f;
        }

        body {
            margin: 0; background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; font-family: 'Pretendard', sans-serif; overflow: hidden; color: white;
        }

        .main-wrapper { text-align: center; }

        h1 {
            font-size: 36px; font-weight: 900; margin-bottom: 30px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 10px rgba(255,255,255,0.2);
        }

        /* 1. 리얼 유리 추첨기 조형 */
        .machine-container {
            position: relative; width: 450px; height: 450px;
            background: var(--machine-glass);
            border: 2px solid var(--machine-border);
            border-radius: 50%;
            box-shadow: inset 0 0 50px rgba(255,255,255,0.1), 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* 유리 질감 하이라이트 */
        .machine-container::before {
            content: ''; position: absolute; top: 10%; left: 15%;
            width: 70%; height: 30%; background: rgba(255,255,255,0.15);
            border-radius: 50%; filter: blur(10px); transform: rotate(-15deg);
        }

        /* 공들이 섞이는 영역 */
        #mix-stage {
            position: relative; width: 100%; height: 100%;
        }

        /* 가짜 공 (불규칙 쉐이킹 애니메이션) */
        .dummy-ball {
            position: absolute; width: 34px; height: 34px; border-radius: 50%;
            opacity: 0.7; filter: blur(1px);
        }

        /* 2. 대기/결과 영역 (하단 배치) */
        .result-stage {
            margin-top: 40px; display: flex; justify-content: center; gap: 15px;
            min-height: 80px; width: 500px;
        }

        /* 진짜 로또 공 (리얼 3D 렌더링) */
        .ball {
            width: 65px; height: 65px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 900; color: white;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            /* 애니메이션: 툭! 떨어지기 */
            animation: ballDrop 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0; transform: translateY(-100px) scale(0.5);
        }

        /* 공 표면 하이라이트 (리얼함의 핵심) */
        .ball::after {
            content: ''; position: absolute; top: 10px; left: 10px;
            width: 30px; height: 30px; background: rgba(255,255,255,0.4);
            border-radius: 50%; filter: blur(2px);
        }

        @keyframes ballDrop {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 로또 색상 (고급스러운 그라데이션) */
        .color-y { background: radial-gradient(circle at 35% 35%, #f1c40f, #f39c12); }
        .color-b { background: radial-gradient(circle at 35% 35%, #3498db, #2980b9); }
        .color-r { background: radial-gradient(circle at 35% 35%, #e74c3c, #c0392b); }
        .color-g { background: radial-gradient(circle at 35% 35%, #95a5a6, #7f8c8d); }
        .color-e { background: radial-gradient(circle at 35% 35%, #2ecc71, #27ae60); }

        /* 컨트롤 버튼 */
        .btn-draw {
            margin-top: 40px; padding: 18px 50px; font-size: 20px; font-weight: bold;
            background: linear-gradient(to bottom, #f1c40f, #f39c12);
            color: #2c3e50; border: none; border-radius: 50px; cursor: pointer;
            transition: all 0.2s; box-shadow: 0 8px 0 #b78a1c, 0 15px 25px rgba(0,0,0,0.3);
            text-shadow: 0 1px 1px rgba(255,255,255,0.5);
        }
        .btn-draw:hover { transform: translateY(-2px); box-shadow: 0 10px 0 #b78a1c, 0 20px 30px rgba(0,0,0,0.4); }
        .btn-draw:active { transform: translateY(4px); box-shadow: 0 4px 0 #b78a1c, 0 10px 15px rgba(0,0,0,0.2); }
        .btn-draw:disabled { background: #95a5a6; color: #7f8c8d; box-shadow: none; cursor: not-allowed; transform: none; }

    </style>
</head>
<body>

    <div class="main-wrapper">
        <h1>PREMIUM LOTTO DRAW</h1>
        
        <div class="machine-container">
            <div id="mix-stage">
                </div>
        </div>

        <div class="result-stage" id="result-stage">
            </div>

        <button class="btn-draw" id="draw-btn" onclick="startPremiumDraw()">추첨 시작 (Start)</button>
    </div>

    <script>
        const mixStage = document.getElementById('mix-stage');
        const resultStage = document.getElementById('result-stage');
        const drawBtn = document.getElementById('draw-btn');

        // 초기화: 가짜 공 생성 및 배치
        function initMachine() {
            const colors = ['color-y', 'color-b', 'color-r', 'color-g', 'color-e'];
            for (let i = 0; i < 45; i++) {
                const ball = document.createElement('div');
                ball.className = `dummy-ball ${colors[i % 5]}`;
                // 초기 무작위 위치
                setBallRandomPos(ball);
                mixStage.appendChild(ball);
            }
        }

        function setBallRandomPos(ball) {
            // 원형 범위 내에 배치하기 위한 수학적 계산
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * 180; // 추첨기 반지름보다 작게
            ball.style.left = `calc(50% + ${Math.cos(angle) * radius}px - 17px)`;
            ball.style.top = `calc(50% + ${Math.sin(angle) * radius}px - 17px)`;
        }

        // 공 색상 클래스
        function getBallColor(num) {
            if (num <= 10) return 'color-y';
            if (num <= 20) return 'color-b';
            if (num <= 30) return 'color-r';
            if (num <= 40) return 'color-g';
            return 'color-e';
        }

        // 핵심: 공 쉐이킹 애니메이션 (불규칙하게 튀기)
        let shakeInterval;
        function startShaking() {
            const balls = document.querySelectorAll('.dummy-ball');
            shakeInterval = setInterval(() => {
                balls.forEach(ball => {
                    // 원래 위치에서 사방으로 50px 범위 내로 튀게 함
                    const moveX = (Math.random() - 0.5) * 100;
                    const moveY = (Math.random() - 0.5) * 100;
                    ball.style.transform = `translate(${moveX}px, ${moveY}px)`;
                    ball.style.transition = 'transform 0.1s ease-out';
                });
            }, 100); // 0.1초마다 흔듦
        }

        function stopShaking() {
            clearInterval(shakeInterval);
            const balls = document.querySelectorAll('.dummy-ball');
            balls.forEach(ball => {
                ball.style.transform = 'translate(0, 0)';
                ball.style.transition = 'transform 0.5s ease-out';
            });
        }

        async function startPremiumDraw() {
            // 초기화
            resultStage.innerHTML = '';
            drawBtn.disabled = true;
            
            // 1. 공 흔들기 시작 (사방으로 튀기)
            startShaking();

            // 번호 추첨 및 정렬
            const numbers = [];
            while(numbers.length < 6) {
                const rand = Math.floor(Math.random() * 45) + 1;
                if(!numbers.includes(rand)) numbers.push(rand);
            }
            numbers.sort((a, b) => a - b);

            // 2. 시간차를 두고 공을 하나씩 떨어뜨리기 (타격감)
            for (let i = 0; i < numbers.length; i++) {
                await new Promise(resolve => setTimeout(resolve, 2500)); // 2.5초 간격
                
                const num = numbers[i];
                const ball = document.createElement('div');
                ball.className = `ball ${getBallColor(num)}`;
                ball.innerHTML = `<span>${num}</span>`;
                
                // 공의 표면 하이라이트 효과 (CSS::after로 구현됨)
                resultStage.appendChild(ball);
            }

            // 3. 섞기 중지
            stopShaking();
            drawBtn.disabled = false;
        }

        // 초기화 실행
        initMachine();
    </script>
</body>
</html>

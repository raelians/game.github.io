<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>숨은 그림 찾기: 극한의 10단계</title>
    <style>
        :root { --accent: #ff4757; --success: #2ed573; --hint: #f1c40f; }
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #2c3e50; color: white; margin: 0; padding: 20px; overflow: hidden; }
        
        #ui-layer { margin-bottom: 15px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 15px; display: inline-block; }
        .stat { font-size: 1.4rem; font-weight: bold; margin: 0 20px; }
        #timer.critical { color: var(--accent); animation: ui-shake 0.2s infinite; }

        #hint-btn {
            background: var(--hint); color: #333; border: none; padding: 5px 15px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        #hint-btn:disabled { background: #7f8c8d; cursor: not-allowed; opacity: 0.5; }

        #game-board {
            position: relative;
            width: 900px; height: 600px; margin: 0 auto;
            background-color: #fff; background-size: cover; background-position: center;
            border: 5px solid #bdc3c7; border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); cursor: crosshair;
        }

        .hidden-item {
            position: absolute; cursor: pointer; user-select: none;
            -webkit-user-drag: none; transition: opacity 0.3s;
        }

        /* 힌트: 제자리에서 흔들리는 애니메이션 */
        @keyframes hint-shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(2px, 0) rotate(2deg); }
            50% { transform: translate(0, 0) rotate(0deg); }
            75% { transform: translate(-2px, 0) rotate(-2deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .hint-active { 
            animation: hint-shake 0.1s linear infinite; 
            z-index: 150; 
            filter: brightness(1.5) drop-shadow(0 0 5px gold); /* 살짝 밝게 해서 강조 */
        }

        /* UI 흔들림 애니메이션 (타이머 위기 시) */
        @keyframes ui-shake { 0% { transform: translateX(0); } 50% { transform: translateX(3px); } 100% { transform: translateX(0); } }

        #flash { position: absolute; inset: 0; background: rgba(255, 0, 0, 0.4); display: none; pointer-events: none; z-index: 100; }
        #flash-success { position: absolute; inset: 0; background: rgba(46, 213, 115, 0.3); display: none; pointer-events: none; z-index: 100; }

        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <span class="stat">STAGE: <span id="level">1</span> / 10</span>
        <span class="stat">TIME: <span id="timer">30</span>s</span>
        <span class="stat">LEFT: <span id="count">0</span></span>
        <button id="hint-btn" onclick="useHint()">HINT (1/1)</button>
    </div>

    <div id="game-board">
        <div id="flash"></div>
        <div id="flash-success"></div>

        <div id="level-overlay" class="overlay">
            <div style="font-size: 3rem; font-weight: bold; color: #f1c40f;">LEVEL UP!</div>
        </div>

        <div id="gameover-modal" class="overlay">
            <h2 style="font-size: 4rem; color: var(--accent);">GAME OVER</h2>
            <p style="font-size: 1.5rem; margin: 20px 0;">최종 기록: STAGE <span id="final-level">1</span></p>
            <button style="padding: 15px 40px; font-size: 1.2rem; font-weight: bold; background: var(--accent); color: white; border: none; border-radius: 30px; cursor: pointer;" onclick="location.reload()">다시 도전하기</button>
        </div>
    </div>

    <script>
        // ... (이전과 동일한 변수 설정 생략)
        const board = document.getElementById('game-board');
        const timerEl = document.getElementById('timer');
        const countEl = document.getElementById('count');
        const levelEl = document.getElementById('level');
        const overlay = document.getElementById('level-overlay');
        const goModal = document.getElementById('gameover-modal');
        const hintBtn = document.getElementById('hint-btn');
        const flashSuccess = document.getElementById('flash-success');

        const backgrounds = [
            'https://images.unsplash.com/photo-1493612276216-ee3925520721?w=900&q=80',
            'https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?w=900&q=80',
            'https://images.unsplash.com/photo-1776011469177-6035c9c6d6a9?w=900&q=80',
            'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=900&q=80',
            'https://images.unsplash.com/photo-1513519245088-0e12902e5a38?w=900&q=80',
            'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=900&q=80',
            'https://images.unsplash.com/photo-1773332611550-9f5a465b4e42?w=900&q=80',
            'https://images.unsplash.com/photo-1519750157634-b6d493a0f77c?w=900&q=80',
            'https://images.unsplash.com/photo-1770131091439-9aa7274f544f?w=900&q=80',
            'https://images.unsplash.com/photo-1762760081003-28ae8d6adbbb?w=900&q=80'
        ];

        const itemPool = [
            'https://cdn-icons-png.flaticon.com/128/2908/2908214.png', 'https://cdn-icons-png.flaticon.com/128/748/748653.png',
            'https://cdn-icons-png.flaticon.com/128/2541/2541991.png', 'https://cdn-icons-png.flaticon.com/128/2913/2913520.png',
            'https://cdn-icons-png.flaticon.com/128/1161/1161388.png', 'https://cdn-icons-png.flaticon.com/128/1048/1048953.png'
        ];

        let currentLevel = 1;
        let timeLeft = 30;
        let foundCount = 0;
        let itemsToFind = 0;
        let timerInterval;
        let isGameOver = false;
        let hintUsed = false;

        function startStage() {
            foundCount = 0;
            hintUsed = false;
            hintBtn.disabled = false;
            hintBtn.innerText = "HINT (1/1)";
            itemsToFind = 3 + Math.floor(currentLevel / 2);
            timeLeft = Math.max(10, 35 - (currentLevel * 2));
            levelEl.innerText = currentLevel;
            countEl.innerText = itemsToFind;
            timerEl.innerText = timeLeft;
            board.style.backgroundImage = `url('${backgrounds[currentLevel - 1]}')`;
            document.querySelectorAll('.hidden-item').forEach(item => item.remove());
            for (let i = 0; i < itemsToFind; i++) { createItem(); }
            runTimer();
        }

        function createItem() {
            const img = document.createElement('img');
            img.src = itemPool[Math.floor(Math.random() * itemPool.length)];
            img.className = 'hidden-item';
            const size = Math.max(15, 45 - (currentLevel * 3));
            img.style.width = `${size}px`;
            img.style.opacity = Math.max(0.2, 0.9 - (currentLevel * 0.07));
            img.style.left = `${Math.random() * (900 - size)}px`;
            img.style.top = `${Math.random() * (600 - size)}px`;
            img.style.transform = `rotate(${Math.random() * 360}deg)`;

            img.onclick = (e) => {
                if(isGameOver) return;
                e.stopPropagation();
                img.remove();
                timeLeft += 2;
                timerEl.innerText = timeLeft;
                flashSuccess.style.display = 'block';
                setTimeout(() => flashSuccess.style.display = 'none', 100);
                foundCount++;
                countEl.innerText = itemsToFind - foundCount;
                if (foundCount === itemsToFind) levelComplete();
            };
            board.appendChild(img);
        }

        // 힌트 함수: 살짝 흔들기
        function useHint() {
            if (hintUsed || isGameOver) return;
            const remainingItems = document.querySelectorAll('.hidden-item');
            if (remainingItems.length > 0) {
                hintUsed = true;
                hintBtn.disabled = true;
                hintBtn.innerText = "HINT (0/1)";
                const target = remainingItems[Math.floor(Math.random() * remainingItems.length)];
                
                // 기존의 rotation 값이 shake 애니메이션에 덮어씌워지지 않도록 처리
                const originalTransform = target.style.transform;
                target.classList.add('hint-active');
                
                setTimeout(() => {
                    target.classList.remove('hint-active');
                }, 1500); // 1.5초 동안 흔들림
            }
        }

        function runTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 5) timerEl.classList.add('critical');
                else timerEl.classList.remove('critical');
                if (timeLeft <= 0) gameOver();
            }, 1000);
        }

        function levelComplete() {
            clearInterval(timerInterval);
            if (currentLevel === 10) { alert("🏆 마스터!"); location.reload(); return; }
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.display = 'none'; currentLevel++; startStage(); }, 1500);
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(timerInterval);
            document.getElementById('final-level').innerText = currentLevel;
            goModal.style.display = 'flex';
        }

        board.onclick = () => {
            if(isGameOver || overlay.style.display === 'flex') return;
            timeLeft = Math.max(0, timeLeft - 2);
            timerEl.innerText = timeLeft;
            document.getElementById('flash').style.display = 'block';
            setTimeout(() => document.getElementById('flash').style.display = 'none', 100);
        };

        startStage();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>지뢰 찾기 - 난이도 선택</title>
    <style>
        :root { --bg: #1a1a2e; --cell-bg: #16213e; --open-bg: #0f3460; --player: #4ecca3; --point: #e94560; }
        body { background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        
        .header { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; gap: 15px; }
        .info-row { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        .diff-row { display: flex; gap: 10px; }
        
        button { border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-family: 'Segoe UI'; }
        .btn-diff { background: #16213e; color: var(--player); border: 1px solid var(--player); }
        .btn-diff.active { background: var(--player); color: var(--bg); }
        .btn-reset { background: var(--point); color: white; }
        .btn-reset:hover { background: #ff4d6d; transform: scale(1.05); }
        
        #board { 
            display: grid; 
            gap: 2px; 
            background: #000; 
            border: 6px solid #0f3460; 
            border-radius: 8px; 
            padding: 2px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        
        .cell {
            width: 30px; height: 30px; background: var(--cell-bg);
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; cursor: pointer; user-select: none;
            font-size: 14px; transition: 0.05s;
        }
        .cell:hover { background: #1f3a5f; }
        .cell.open { background: var(--open-bg); cursor: default; }
        .cell.mine { background: var(--point) !important; }
        .cell.flag { color: #f9ed69; }
        
        .n1 { color: #4ecca3; } .n2 { color: #f9ed69; } .n3 { color: #e94560; }
        .n4 { color: #a29bfe; } .n5 { color: #fdcb6e; }
        
        .status-msg { margin-top: 15px; font-size: 18px; font-weight: bold; color: var(--player); height: 24px; }
    </style>
</head>
<body>

<div class="header">
    <div class="info-row">
        <div style="font-size: 24px; font-weight: bold;">💣 MINESWEEPER</div>
        <button class="btn-reset" onclick="initGame()">다시 시작</button>
    </div>
    <div class="diff-row">
        <button class="btn-diff active" onclick="changeDifficulty(9, 9, 10, this)">쉬움</button>
        <button class="btn-diff" onclick="changeDifficulty(16, 16, 40, this)">보통</button>
        <button class="btn-diff" onclick="changeDifficulty(16, 30, 99, this)">어려움</button>
    </div>
</div>

<div id="board"></div>
<div class="status-msg" id="status-msg"></div>

<div style="margin-top: 10px; color: #95a5a6; font-size: 14px;">
    남은 지뢰: <span id="mine-display">0</span> | 좌클릭: 열기 / 우클릭: 깃발
</div>

<script>
let ROWS = 9, COLS = 9, MINES = 10;
let boardData = [], revealedCount = 0, flagsUsed = 0, gameOver = false;

const boardEl = document.getElementById('board');
const mineDisplay = document.getElementById('mine-display');
const statusMsg = document.getElementById('status-msg');

function changeDifficulty(r, c, m, btn) {
    ROWS = r; COLS = c; MINES = m;
    document.querySelectorAll('.btn-diff').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    initGame();
}

function initGame() {
    boardEl.innerHTML = '';
    boardEl.style.gridTemplateColumns = `repeat(${COLS}, 30px)`;
    boardData = []; revealedCount = 0; flagsUsed = 0; gameOver = false;
    mineDisplay.innerText = MINES;
    statusMsg.innerText = "";

    for (let r = 0; r < ROWS; r++) {
        boardData[r] = [];
        for (let c = 0; c < COLS; c++) {
            const el = document.createElement('div');
            el.className = 'cell';
            boardData[r][c] = { r, c, mine: false, open: false, flag: false, count: 0, el };
            el.onmousedown = (e) => handleInteract(e, boardData[r][c]);
            el.oncontextmenu = (e) => e.preventDefault();
            boardEl.appendChild(el);
        }
    }

    let placed = 0;
    while (placed < MINES) {
        let r = Math.floor(Math.random() * ROWS), c = Math.floor(Math.random() * COLS);
        if (!boardData[r][c].mine) { boardData[r][c].mine = true; placed++; }
    }

    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (boardData[r][c].mine) continue;
            let count = 0;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (boardData[r+dr]?.[c+dc]?.mine) count++;
                }
            }
            boardData[r][c].count = count;
        }
    }
}

function handleInteract(e, cell) {
    if (gameOver || cell.open) return;
    if (e.button === 0) { // 좌클릭
        if (cell.flag) return;
        reveal(cell);
    } else if (e.button === 2) { // 우클릭
        cell.flag = !cell.flag;
        cell.el.innerText = cell.flag ? '🚩' : '';
        cell.el.classList.toggle('flag', cell.flag);
        flagsUsed += cell.flag ? 1 : -1;
        mineDisplay.innerText = MINES - flagsUsed;
    }
}

function reveal(cell) {
    if (cell.open || cell.flag) return;
    cell.open = true;
    cell.el.classList.add('open');
    revealedCount++;

    if (cell.mine) {
        cell.el.innerText = '💣';
        endGame(false);
        return;
    }

    if (cell.count > 0) {
        cell.el.innerText = cell.count;
        cell.el.classList.add(`n${cell.count}`);
    } else {
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                if (boardData[cell.r+dr]?.[cell.c+dc]) reveal(boardData[cell.r+dr][cell.c+dc]);
            }
        }
    }

    if (revealedCount === (ROWS * COLS) - MINES) endGame(true);
}

function endGame(win) {
    gameOver = true;
    statusMsg.innerText = win ? "🎉 MISSION COMPLETE!" : "💥 MISSION FAILED!";
    statusMsg.style.color = win ? "#4ecca3" : "#e94560";
    boardData.flat().forEach(cell => {
        if (cell.mine) {
            cell.el.innerText = '💣';
            cell.el.classList.add('mine');
        }
    });
}

initGame();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>테트리스 - 일시정지 및 설명서 추가</title>
    <style>
        body { background: #202028; color: #fff; font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .game-container { display: flex; align-items: flex-start; gap: 30px; }
        canvas { border: solid 2px #fff; background-color: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .side-panel { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 200px; }
        .score { font-size: 28px; margin-bottom: 10px; font-weight: bold; color: #FFD700; }
        .next-container { border: 2px solid #555; padding: 15px; text-align: center; width: 100%; border-radius: 8px; background: rgba(255,255,255,0.05); }
        #nextCanvas { background: #000; margin-top: 10px; }
        
        /* 버튼 스타일 */
        .controls { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        button { cursor: pointer; padding: 10px; background: #444; color: white; border: 1px solid #fff; border-radius: 4px; transition: 0.2s; font-size: 14px; }
        button:hover { background: #666; }
        #pauseBtn { background: #8b0000; }
        #pauseBtn.active { background: #006400; }

        /* 설명서 스타일 */
        .manual { margin-top: 10px; padding: 15px; border-radius: 8px; background: #333; width: 100%; font-size: 13px; line-height: 1.6; }
        .manual table { width: 100%; border-collapse: collapse; }
        .manual td { padding: 4px 0; }
        .key { color: #0DC2FF; font-weight: bold; }
        
        .hidden { opacity: 0; visibility: hidden; }
    </style>
</head>
<body>
    <div class="score">점수: <span id="score">0</span></div>
    
    <div class="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
        
        <div class="side-panel">
            <div class="next-container">
                <div>다음 블록</div>
                <canvas id="nextCanvas" width="80" height="80"></canvas>
            </div>

            <div class="controls">
                <button id="toggleNext">다음 블록 감추기</button>
                <button id="pauseBtn">일시 정지 (P)</button>
            </div>

            <div class="manual">
                <strong style="display:block; margin-bottom:8px; border-bottom:1px solid #555;">🎮 조작 방법</strong>
                <table>
                    <tr><td><span class="key">← →</span></td><td>좌우 이동</td></tr>
                    <tr><td><span class="key">↓</span></td><td>빠른 하강</td></tr>
                    <tr><td><span class="key">Q / W</span></td><td>회전 (좌/우)</td></tr>
                    <tr><td><span class="key">P</span></td><td>일시정지</td></tr>
                </table>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextContext = nextCanvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const toggleBtn = document.getElementById('toggleNext');
        const pauseBtn = document.getElementById('pauseBtn');
        const nextContainer = document.querySelector('.next-container');

        context.scale(20, 20);
        nextContext.scale(20, 20);

        let paused = false; // 일시정지 상태 변수

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
            }
            updateScore();
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function createPiece(type) {
            if (type === 'T') return [[0, 1, 0], [1, 1, 1], [0, 0, 0]];
            else if (type === 'O') return [[2, 2], [2, 2]];
            else if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
            else if (type === 'J') return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
            else if (type === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
            else if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            else if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
        }

        const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0}, context);
            drawMatrix(player.matrix, player.pos, context);

            if (paused) {
                context.fillStyle = 'rgba(0,0,0,0.5)';
                context.fillRect(0, 0, canvas.width, canvas.height);
                context.fillStyle = '#fff';
                context.font = '1px Arial';
                context.textAlign = 'center';
                context.fillText('PAUSED', 6, 10);
            }
        }

        function drawNext() {
            nextContext.fillStyle = '#000';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            drawMatrix(nextPiece, {x: 1, y: 1}, nextContext);
        }

        function drawMatrix(matrix, offset, ctx) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerDrop() {
            if (paused) return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            if (paused) return;
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        let nextPiece = null;

        function playerReset() {
            const pieces = 'ILJOTSZ';
            if (nextPiece === null) {
                nextPiece = createPiece(pieces[pieces.length * Math.random() | 0]);
            }
            player.matrix = nextPiece;
            nextPiece = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                updateScore();
            }
            drawNext();
        }

        function playerRotate(dir) {
            if (paused) return;
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function togglePause() {
            paused = !paused;
            if (paused) {
                pauseBtn.innerText = '재개 하기 (P)';
                pauseBtn.classList.add('active');
            } else {
                pauseBtn.innerText = '일시 정지 (P)';
                pauseBtn.classList.remove('active');
            }
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            if (!paused) {
                const deltaTime = time - lastTime;
                lastTime = time;
                dropCounter += deltaTime;
                if (dropCounter > dropInterval) {
                    playerDrop();
                }
            } else {
                lastTime = time; // 일시정지 중 흐른 시간 보정
            }
            draw();
            requestAnimationFrame(update);
        }

        function updateScore() {
            scoreElement.innerText = player.score;
        }

        toggleBtn.addEventListener('click', () => {
            if (nextContainer.classList.contains('hidden')) {
                nextContainer.classList.remove('hidden');
                toggleBtn.innerText = '다음 블록 감추기';
            } else {
                nextContainer.classList.add('hidden');
                toggleBtn.innerText = '다음 블록 보기';
            }
        });

        pauseBtn.addEventListener('click', togglePause);

        const arena = createMatrix(12, 20);
        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
        };

        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 81) playerRotate(-1);
            else if (event.keyCode === 87) playerRotate(1);
            else if (event.keyCode === 80) togglePause(); // P 키 일시정지
        });

        playerReset();
        updateScore();
        update();
    </script>
</body>
</html>

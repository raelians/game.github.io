<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>숨은 그림 찾기: 극한의 10단계</title>
    <style>
        :root { --accent: #ff4757; --success: #2ed573; }
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #2c3e50; color: white; margin: 0; padding: 20px; overflow: hidden; }
        
        #ui-layer { margin-bottom: 15px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 15px; display: inline-block; }
        .stat { font-size: 1.4rem; font-weight: bold; margin: 0 20px; }
        #timer.critical { color: var(--accent); animation: shake 0.2s infinite; }

        #game-board {
            position: relative;
            width: 900px;
            height: 600px;
            margin: 0 auto;
            background-color: #fff;
            background-size: cover;
            background-position: center;
            border: 5px solid #bdc3c7;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            cursor: crosshair;
        }

        .hidden-item {
            position: absolute;
            cursor: pointer;
            user-select: none;
            -webkit-user-drag: none;
            transition: opacity 0.3s;
        }

        #flash { position: absolute; inset: 0; background: rgba(255, 0, 0, 0.4); display: none; pointer-events: none; z-index: 100; }
        #flash-success { position: absolute; inset: 0; background: rgba(46, 213, 115, 0.3); display: none; pointer-events: none; z-index: 100; }

        /* 레벨업 및 게임오버 모달 공통 스타일 */
        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 200;
        }
        
        #level-overlay { font-size: 3rem; font-weight: bold; color: #f1c40f; }

        /* 게임 오버 모달 커스텀 */
        #gameover-modal { color: white; }
        #gameover-modal h2 { font-size: 4rem; color: var(--accent); margin: 0; }
        #gameover-modal p { font-size: 1.5rem; margin: 20px 0; }
        .retry-btn {
            padding: 15px 40px; font-size: 1.2rem; font-weight: bold;
            background: var(--accent); color: white; border: none; border-radius: 30px;
            cursor: pointer; transition: transform 0.2s;
        }
        .retry-btn:hover { transform: scale(1.1); }

        @keyframes shake { 0% { transform: translateX(0); } 50% { transform: translateX(3px); } 100% { transform: translateX(0); } }
    </style>
</head>
<body>
<!--
10단계 마스터 시스템 상세 사양
스테이지별 배경 큐레이션:

1~3단계: 실내 위주의 비교적 명확한 배경

4~7단계: 사무실, 카페 등 사물이 많은 배경

8~10단계: 패턴이 복잡하거나 색상이 화려한 추상적 이미지 (찾기 정말 힘듭니다!)

극한의 난이도 곡선:

크기: 1단계(45px) → 10단계(15px). 후반엔 점처럼 보일 수 있어요.

투명도: 1단계(0.9) → 10단계(0.2). 배경색과 거의 동화됩니다.

제한 시간: 1단계(30초) → 10단계(15초 전후). 실수 한 번이 치명적입니다.

오답 페널티 강화:

잘못 클릭하면 화면이 붉게 변하며 시간 2초가 즉시 삭제됩니다. 신중하게 클릭해야 해요.

보상 기능:
정답이면 보상으로 2초 획득

엔딩 메시지:

10단계를 모두 클리어하면 마스터 등극 축하 메시지가 뜹니다.
//-->
    <div id="ui-layer">
        <span class="stat">STAGE: <span id="level">1</span> / 10</span>
        <span class="stat">TIME: <span id="timer">30</span>s</span>
        <span class="stat">LEFT: <span id="count">0</span></span>
    </div>

    <div id="game-board">
        <div id="flash"></div>
        <div id="flash-success"></div>

        <div id="level-overlay" class="overlay">
            <div id="level-text">LEVEL UP!</div>
            <div style="font-size: 1.2rem; color: white; margin-top: 10px;">난이도가 상승합니다...</div>
        </div>

        <div id="gameover-modal" class="overlay">
            <h2>GAME OVER</h2>
            <p>최종 기록: STAGE <span id="final-level">1</span></p>
            <button class="retry-btn" onclick="location.reload()">다시 도전하기</button>
        </div>
    </div>

    <script>
        const board = document.getElementById('game-board');
        const timerEl = document.getElementById('timer');
        const countEl = document.getElementById('count');
        const levelEl = document.getElementById('level');
        const overlay = document.getElementById('level-overlay');
        const goModal = document.getElementById('gameover-modal');
        const finalLevelEl = document.getElementById('final-level');
        const flashSuccess = document.getElementById('flash-success');

        const backgrounds = [
            'https://images.unsplash.com/photo-1493612276216-ee3925520721?w=900&q=80',
            'https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?w=900&q=80',
            'https://images.unsplash.com/photo-1776011469177-6035c9c6d6a9?w=900&q=80',
            'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=900&q=80',
            'https://images.unsplash.com/photo-1513519245088-0e12902e5a38?w=900&q=80',
            'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=900&q=80',
            'https://images.unsplash.com/photo-1773332611550-9f5a465b4e42?w=900&q=80',
            'https://images.unsplash.com/photo-1519750157634-b6d493a0f77c?w=900&q=80',
            'https://images.unsplash.com/photo-1770131091439-9aa7274f544f?w=900&q=80',
            'https://images.unsplash.com/photo-1762760081003-28ae8d6adbbb?w=900&q=80'
        ];

        const itemPool = [
            'https://cdn-icons-png.flaticon.com/128/2908/2908214.png', 'https://cdn-icons-png.flaticon.com/128/748/748653.png',
            'https://cdn-icons-png.flaticon.com/128/2541/2541991.png', 'https://cdn-icons-png.flaticon.com/128/2913/2913520.png',
            'https://cdn-icons-png.flaticon.com/128/1161/1161388.png', 'https://cdn-icons-png.flaticon.com/128/1048/1048953.png',
            'https://cdn-icons-png.flaticon.com/128/4151/4151429.png', 'https://cdn-icons-png.flaticon.com/128/3135/3135715.png'
        ];

        let currentLevel = 1;
        let timeLeft = 30;
        let foundCount = 0;
        let itemsToFind = 0;
        let timerInterval;
        let isGameOver = false;

        function startStage() {
            foundCount = 0;
            itemsToFind = 3 + Math.floor(currentLevel / 2);
            timeLeft = Math.max(10, 35 - (currentLevel * 2));
            
            levelEl.innerText = currentLevel;
            countEl.innerText = itemsToFind;
            timerEl.innerText = timeLeft;
            timerEl.classList.remove('critical');

            board.style.backgroundImage = `url('${backgrounds[currentLevel - 1]}')`;
            const existingItems = document.querySelectorAll('.hidden-item');
            existingItems.forEach(item => item.remove());

            for (let i = 0; i < itemsToFind; i++) {
                createItem();
            }
            runTimer();
        }

        function createItem() {
            const img = document.createElement('img');
            img.src = itemPool[Math.floor(Math.random() * itemPool.length)];
            img.className = 'hidden-item';

            const size = Math.max(15, 45 - (currentLevel * 3));
            const opacity = Math.max(0.2, 0.9 - (currentLevel * 0.07));

            img.style.width = `${size}px`;
            img.style.opacity = opacity;
            img.style.left = `${Math.random() * (900 - size)}px`;
            img.style.top = `${Math.random() * (600 - size)}px`;
            img.style.transform = `rotate(${Math.random() * 360}deg)`;

            img.onclick = (e) => {
                if(isGameOver) return;
                e.stopPropagation();
                img.style.pointerEvents = 'none';
                img.style.opacity = '0';
                
                // 보상: 시간 2초 추가
                timeLeft += 2;
                timerEl.innerText = timeLeft;
                flashSuccess.style.display = 'block';
                setTimeout(() => flashSuccess.style.display = 'none', 100);

                setTimeout(() => img.remove(), 300);
                
                foundCount++;
                countEl.innerText = itemsToFind - foundCount;

                if (foundCount === itemsToFind) {
                    levelComplete();
                }
            };
            board.appendChild(img);
        }

        function runTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 5) timerEl.classList.add('critical');
                else timerEl.classList.remove('critical');
                
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    timerEl.innerText = 0;
                    gameOver();
                }
            }, 1000);
        }

        function levelComplete() {
            clearInterval(timerInterval);
            if (currentLevel === 10) {
                alert("🏆 마스터 등극!");
                location.reload();
                return;
            }

            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.display = 'none';
                currentLevel++;
                startStage();
            }, 1500);
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(timerInterval);
            finalLevelEl.innerText = currentLevel;
            goModal.style.display = 'flex'; // 모달 띄우기
        }

        board.onclick = () => {
            if(isGameOver || overlay.style.display === 'flex') return;
            timeLeft = Math.max(0, timeLeft - 2);
            timerEl.innerText = timeLeft;
            const flash = document.getElementById('flash');
            flash.style.display = 'block';
            setTimeout(() => flash.style.display = 'none', 100);
        };

        startStage();
    </script>
</body>
</html>

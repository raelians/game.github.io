<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Typing Battle: 1vs1</title>
    <style>
        body { background: #0f172a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        canvas { border: 4px solid #334155; background: #020617; border-radius: 10px; }
        .ui-container { display: flex; justify-content: space-between; width: 900px; margin-bottom: 10px; }
        .player-info { padding: 10px 20px; border-radius: 8px; width: 200px; text-align: center; }
        .p1-ui { background: rgba(56, 189, 248, 0.2); border: 2px solid #38bdf8; color: #38bdf8; }
        .p2-ui { background: rgba(168, 85, 247, 0.2); border: 2px solid #a855f7; color: #a855f7; }
        .input-container { display: flex; gap: 100px; margin-top: 20px; }
        input { padding: 12px; font-size: 1.2rem; border-radius: 20px; border: 2px solid #334155; background: #1e293b; color: #fff; text-align: center; outline: none; width: 220px; }
        input:focus { border-color: inherit; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .win-msg { position: absolute; font-size: 5rem; font-weight: bold; text-shadow: 0 0 20px rgba(0,0,0,0.5); display: none; z-index: 10; }
    </style>
</head>
<body>
<!--// P1: 왼쪽 입력칸에 치고 Enter!

P2: 오른쪽 입력칸에 치고 Enter!

팁: 실제 플레이 시에는 두 개의 키보드를 연결하거나, 한 명씩 입력창을 마우스로 클릭해서 포커스를 준 뒤 플레이해야 합니다 //-->
    <div id="winMsg" class="win-msg"></div>
    <div class="ui-container">
        <div class="player-info p1-ui">
            <div>PLAYER 1 (Blue)</div>
            <div style="font-size: 1.5rem; font-weight: bold;">SCORE: <span id="p1Score">0</span></div>
            <div>LIVES: <span id="p1Lives">5</span></div>
        </div>
        <div style="text-align: center;">
            <h2 style="margin: 0; color: #fbbf24;">TYPING BATTLE</h2>
            <div id="stageInfo">STAGE: 1</div>
        </div>
        <div class="player-info p2-ui">
            <div>PLAYER 2 (Purple)</div>
            <div style="font-size: 1.5rem; font-weight: bold;">SCORE: <span id="p2Score">0</span></div>
            <div>LIVES: <span id="p2Lives">5</span></div>
        </div>
    </div>

    <canvas id="gameCanvas" width="900" height="500"></canvas>

    <div class="input-container">
        <input type="text" id="p1Input" placeholder="P1 Type Here" autocomplete="off">
        <input type="text" id="p2Input" placeholder="P2 Type Here" autocomplete="off">
    </div>
    <div style="margin-top: 15px; color: #64748b;">P1: Enter key | P2: Enter key (공용 입력)</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const p1In = document.getElementById('p1Input'), p2In = document.getElementById('p2Input');
const p1ScoreEl = document.getElementById('p1Score'), p2ScoreEl = document.getElementById('p2Score');
const p1LifeEl = document.getElementById('p1Lives'), p2LifeEl = document.getElementById('p2Lives');
const winMsg = document.getElementById('winMsg');

const wordList = ["light", "dark", "power", "speed", "logic", "pixel", "space", "earth", "music", "world", "coder", "brain", "ghost", "storm", "magic"];

let p1Words = [], p2Words = [];
let p1Score = 0, p2Score = 0, p1Lives = 5, p2Lives = 5;
let stage = 1, gameStarted = true, isGameOver = false;
let lastSpawn = 0, spawnRate = 2000;

function spawnWords() {
    const text1 = wordList[Math.floor(Math.random() * wordList.length)];
    const text2 = wordList[Math.floor(Math.random() * wordList.length)];
    
    // P1 영역 (왼쪽)
    p1Words.push({ text: text1, x: Math.random() * 300 + 70, y: -30, speed: 0.8 + stage * 0.2 });
    // P2 영역 (오른쪽)
    p2Words.push({ text: text2, x: Math.random() * 300 + 520, y: -30, speed: 0.8 + stage * 0.2 });
}

function update(time) {
    if (isGameOver) return;

    if (time - lastSpawn > spawnRate) {
        spawnWords();
        lastSpawn = time;
    }

    // P1 업데이트
    p1Words.forEach((w, i) => {
        w.y += w.speed;
        if (w.y > canvas.height) { p1Words.splice(i, 1); p1Lives--; p1LifeEl.innerText = p1Lives; }
    });

    // P2 업데이트
    p2Words.forEach((w, i) => {
        w.y += w.speed;
        if (w.y > canvas.height) { p2Words.splice(i, 1); p2Lives--; p2LifeEl.innerText = p2Lives; }
    });

    if (p1Lives <= 0 || p2Lives <= 0) endGame();
    
    if ((p1Score + p2Score) >= stage * 1000) {
        stage++;
        spawnRate = Math.max(800, spawnRate - 200);
        document.getElementById('stageInfo').innerText = "STAGE: " + stage;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 중앙 분리선
    ctx.strokeStyle = "#334155";
    ctx.setLineDash([10, 10]);
    ctx.beginPath(); ctx.moveTo(450, 0); ctx.lineTo(450, canvas.height); ctx.stroke();
    ctx.setLineDash([]);

    // P1 단어 (Blue)
    ctx.font = "bold 22px Courier New";
    ctx.textAlign = "center";
    p1Words.forEach(w => {
        ctx.fillStyle = "#38bdf8";
        ctx.fillText(w.text, w.x, w.y);
    });

    // P2 단어 (Purple)
    p2Words.forEach(w => {
        ctx.fillStyle = "#a855f7";
        ctx.fillText(w.text, w.x, w.y);
    });
}

function handleInput(e, player) {
    if (e.key === 'Enter') {
        if (isGameOver) { location.reload(); return; }
        
        const input = player === 1 ? p1In : p2In;
        const val = input.value.trim().toLowerCase();
        const list = player === 1 ? p1Words : p2Words;
        
        const idx = list.findIndex(w => w.text === val);
        if (idx !== -1) {
            list.splice(idx, 1);
            if (player === 1) { p1Score += 100; p1ScoreEl.innerText = p1Score; }
            else { p2Score += 100; p2ScoreEl.innerText = p2Score; }
        }
        input.value = "";
    }
}

p1In.addEventListener('keydown', (e) => handleInput(e, 1));
p2In.addEventListener('keydown', (e) => handleInput(e, 2));

function endGame() {
    isGameOver = true;
    winMsg.style.display = "block";
    if (p1Lives <= 0 && p2Lives <= 0) {
        winMsg.innerText = "DRAW!"; winMsg.style.color = "#fff";
    } else if (p2Lives <= 0) {
        winMsg.innerText = "P1 WIN!"; winMsg.style.color = "#38bdf8";
    } else {
        winMsg.innerText = "P2 WIN!"; winMsg.style.color = "#a855f7";
    }
}

function loop(time) {
    update(time);
    draw();
    requestAnimationFrame(loop);
}
p1In.focus();
loop(0);
</script>
</body>
</html>

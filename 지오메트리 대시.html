<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>JS Geo Dash - Pro Version</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #111; overflow: hidden; font-family: 'Arial', sans-serif; }
        #gameContainer { position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        canvas { border: 4px solid #fff; background: linear-gradient(180deg, #6dd5ed 0%, #2193b0 100%); display: block; }
        
        /* 메뉴 및 오버레이 스타일 */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.75); color: white; z-index: 20; text-align: center; }
        .hidden { display: none !important; }
        
        h1 { font-size: 60px; margin: 0 0 20px 0; text-shadow: 3px 3px #ff0055; letter-spacing: 2px; }
        p { font-size: 20px; margin-bottom: 30px; color: #ccc; }
        
        button { padding: 15px 35px; font-size: 20px; cursor: pointer; border: none; border-radius: 8px; background: #fff; color: #333; font-weight: bold; margin: 8px; transition: 0.3s; }
        button:hover { background: #ff0055; color: #fff; transform: translateY(-5px); }
        
        #scoreBoard { position: absolute; top: 25px; left: 25px; color: white; font-size: 32px; font-weight: bold; z-index: 10; pointer-events: none; }
        #gravityAlert { position: absolute; top: 25px; right: 25px; color: #ffff00; font-size: 22px; font-weight: bold; z-index: 10; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="scoreBoard">Score: 0</div>
        <div id="gravityAlert"></div>

        <div id="startMenu" class="overlay">
            <h1>GEO DASH</h1>
            <p>Select Your Challenge</p>
            <div>
                <button onclick="startGame('easy')">EASY</button>
                <button onclick="startGame('normal')">NORMAL</button>
                <button onclick="startGame('hard')">HARD</button>
            </div>
        </div>

        <div id="gameOverMenu" class="overlay hidden">
            <h1 style="color: #ff0055;">CRASHED!</h1>
            <p id="finalScore" style="font-size: 30px; color: #fff;">Score: 0</p>
            <button onclick="resetToMenu()">MAIN MENU</button>
            <button onclick="retryGame()" style="background: #ff0055; color: #fff;">RETRY</button>
        </div>

        <canvas id="gameCanvas" width="900" height="400"></canvas>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreBoard = document.getElementById('scoreBoard');
    const gravityAlert = document.getElementById('gravityAlert');
    const finalScoreText = document.getElementById('finalScore');

    // 변수 설정
    let gravity, jumpStrength, gameSpeed, maxObstacleGroup, spawnInterval, currentDiff;
    const GROUND_Y = canvas.height - 60;
    const CEILING_Y = 60;
    const MOUNTAIN_SPEED = 1.5;

    let score = 0, isGameOver = false, isReversed = false;
    let obstacles = [], mountains = [], frameCount = 0, lastSpawnFrame = 0;
    let gravityTimeout;

    class Mountain {
        constructor(x = null) {
            this.w = 150 + Math.random() * 200; this.h = 100 + Math.random() * 150;
            this.x = (x !== null) ? x : canvas.width; this.y = GROUND_Y;
            this.color = `rgb(30, ${100 + Math.floor(Math.random() * 80)}, 50)`;
        }
        draw() { ctx.fillStyle = this.color; ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x + this.w / 2, this.y - this.h); ctx.lineTo(this.x + this.w, this.y); ctx.fill(); }
        update() { this.x -= MOUNTAIN_SPEED; }
    }

    const player = {
        x: 120, y: GROUND_Y - 40, w: 40, h: 40, vy: 0, rotation: 0, grounded: false,
        draw() {
            ctx.save(); ctx.translate(this.x + this.w/2, this.y + this.h/2);
            if (isReversed) ctx.scale(1, -1); ctx.rotate(this.rotation);
            ctx.fillStyle = '#ff0055'; ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
            ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.strokeRect(-this.w/2, -this.h/2, this.w, this.h);
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-8,-10,7,0,Math.PI*2); ctx.arc(8,-10,7,0,Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-8,-8,3,0,Math.PI*2); ctx.arc(8,-8,3,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#000'; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(-7,10); ctx.lineTo(7,10); ctx.stroke();
            ctx.restore();
        },
        update() {
            this.vy += gravity; this.y += this.vy;
            if (!isReversed) {
                if (this.y > GROUND_Y - this.h) { this.y = GROUND_Y - this.h; this.vy = 0; this.grounded = true; this.rotation = Math.round(this.rotation / (Math.PI/2)) * (Math.PI/2); }
                else { this.rotation += 0.16; this.grounded = false; }
            } else {
                if (this.y < CEILING_Y) { this.y = CEILING_Y; this.vy = 0; this.grounded = true; this.rotation = Math.round(this.rotation / (Math.PI/2)) * (Math.PI/2); }
                else { this.rotation -= 0.16; this.grounded = false; }
            }
        }
    };

    class Obstacle {
        constructor(offsetX = 0) {
            this.w = 30; this.h = 40 + Math.random() * 25;
            this.x = canvas.width + offsetX; this.inverted = isReversed;
            this.y = this.inverted ? CEILING_Y : GROUND_Y - this.h;
        }
        draw() {
            ctx.fillStyle = '#000'; ctx.beginPath();
            if (!this.inverted) { ctx.moveTo(this.x, GROUND_Y); ctx.lineTo(this.x+this.w/2, GROUND_Y-this.h); ctx.lineTo(this.x+this.w, GROUND_Y); }
            else { ctx.moveTo(this.x, CEILING_Y); ctx.lineTo(this.x+this.w/2, CEILING_Y+this.h); ctx.lineTo(this.x+this.w, CEILING_Y); }
            ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
        }
        update() { this.x -= gameSpeed; }
    }

    function startGame(difficulty) {
        currentDiff = difficulty;
        if (difficulty === 'easy') { gravity = 0.7; jumpStrength = -12; gameSpeed = 6; maxObstacleGroup = 1; spawnInterval = 85; }
        else if (difficulty === 'normal') { gravity = 0.8; jumpStrength = -13; gameSpeed = 8; maxObstacleGroup = 3; spawnInterval = 70; }
        else { gravity = 1.0; jumpStrength = -15; gameSpeed = 11; maxObstacleGroup = 4; spawnInterval = 50; }

        score = 0; isGameOver = false; isReversed = false; obstacles = []; mountains = []; frameCount = 0; lastSpawnFrame = 0;
        gravityAlert.innerText = ""; scoreBoard.innerText = "Score: 0";
        document.getElementById('startMenu').classList.add('hidden');
        document.getElementById('gameOverMenu').classList.add('hidden');
        
        let curX = -100; while(curX < canvas.width) { let m = new Mountain(curX); mountains.push(m); curX += m.w * 0.7; }
        gameLoop();
    }

    function toggleGravity() {
        if (isGameOver) return;
        isReversed = !isReversed; gravity *= -1; jumpStrength *= -1;
        gravityAlert.innerText = isReversed ? "GRAVITY INVERTED!" : "";
        clearTimeout(gravityTimeout);
        gravityTimeout = setTimeout(() => { if(isReversed && !isGameOver) toggleGravity(); }, 5000);
    }

    function triggerGameOver() {
        isGameOver = true;
        finalScoreText.innerText = "Score: " + score;
        document.getElementById('gameOverMenu').classList.remove('hidden');
    }

    function retryGame() { startGame(currentDiff); }
    function resetToMenu() { location.reload(); }

    function gameLoop() {
        if (isGameOver) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (frameCount > 0 && frameCount % 600 === 0 && Math.random() < 0.5) toggleGravity();
        if (frameCount % 100 === 0 && Math.random() < 0.6) mountains.push(new Mountain());
        mountains.forEach((m, i) => { m.update(); m.draw(); if(m.x+m.w < 0) mountains.splice(i,1); });

        ctx.fillStyle = '#333'; ctx.fillRect(0, GROUND_Y, canvas.width, 60); ctx.fillRect(0, 0, canvas.width, CEILING_Y);

        ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 2;
        let spacing = 50, offset = (frameCount * gameSpeed) % spacing;
        for (let x = -spacing; x <= canvas.width + spacing; x += spacing) {
            ctx.beginPath(); ctx.moveTo(x-offset, GROUND_Y); ctx.lineTo(x-offset-15, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x-offset, CEILING_Y); ctx.lineTo(x-offset+15, 0); ctx.stroke();
        }

        player.update(); player.draw();

        if (Math.random() < 0.05 && frameCount - lastSpawnFrame > spawnInterval) {
            let groupSize = (maxObstacleGroup === 1) ? 1 : Math.floor(Math.random() * maxObstacleGroup) + 1;
            for (let i = 0; i < groupSize; i++) obstacles.push(new Obstacle(i * 35));
            lastSpawnFrame = frameCount;
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].update(); obstacles[i].draw();
            if (player.x + 8 < obstacles[i].x + obstacles[i].w && player.x + player.w - 8 > obstacles[i].x &&
                player.y + 8 < obstacles[i].y + obstacles[i].h && player.y + player.h - 8 > obstacles[i].y) {
                triggerGameOver();
            }
            if (obstacles[i].x + obstacles[i].w < 0) {
                obstacles.splice(i, 1); score++; scoreBoard.innerText = "Score: " + score;
            }
        }
        frameCount++;
        requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && player.grounded && !isGameOver) { player.vy = jumpStrength; }
    });
</script>
</body>
</html>
